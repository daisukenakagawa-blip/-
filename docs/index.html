<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b3d2e">
<title>カードゲーム集</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(circle at 50% -10%, #14573d, #07291d 75%);
    color:#fff;min-height:100dvh;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    display:flex;flex-direction:column;align-items:center;
  }
  h1{color:#f5c542;margin:28px 0 4px;font-size:26px;text-align:center;}
  .sub{color:#bfe2d4;font-size:12px;letter-spacing:.25em;margin-bottom:24px;}
  .cards{width:100%;max-width:420px;display:flex;flex-direction:column;gap:16px;}
  a.tile{
    display:block;text-decoration:none;color:#fff;
    background:#0a2419;border:1px solid #2c6b52;border-radius:16px;
    padding:20px 18px;box-shadow:0 6px 16px #00000055;
    transition:transform .08s;
  }
  a.tile:active{transform:scale(.98);}
  a.tile .ico{font-size:34px;}
  a.tile .ttl{font-size:20px;font-weight:800;color:#f5c542;margin:6px 0 4px;}
  a.tile .desc{font-size:13px;color:#cfe9dd;line-height:1.6;}
  .foot{color:#6f9685;font-size:11px;margin:28px 0 16px;text-align:center;line-height:1.7;}
</style>
</head>
<body>
  <h1>♠ カードゲーム集 ♥</h1>
  <div class="sub">MOBILE CARD GAMES</div>
  <div class="cards">
    <a class="tile" href="./texas-holdem/">
      <div class="ico">🃏</div>
      <div class="ttl">テキサスホールデム</div>
      <div class="desc">6人固定・ノーリミット。スマホを回して対戦。サイドポット／オールイン／スプリット対応。</div>
    </a>
    <a class="tile" href="./mobile-game/">
      <div class="ico">🎰</div>
      <div class="ttl">ビデオポーカー</div>
      <div class="desc">Jacks or Better。1人でサクッと遊べる定番。タップでホールド→ドロー。</div>
    </a>
  </div>
  <div class="foot">
    ホーム画面に追加すると「アプリ」として全画面・オフラインで起動できます。
  </div>
</body>
</html>
