# アフレコ動画(ユーザー提供の字幕入り画像 + VOICEVOX 音声)を
# YouTube に予約投稿する。publish_now.txt の更新、または手動実行で起動する。

name: voiceover-publish

on:
  workflow_dispatch:
    inputs:
      publish_at_jst:
        description: "公開時刻 JST (例: 2026-06-18 12:00)。空なら即時公開"
        required: false
        default: ""
  push:
    branches:
      - claude/pensive-carson-i2hqgr
    paths:
      - auto_video_uploader/publish_now.txt

permissions:
  contents: write

concurrency:
  group: voiceover-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: auto_video_uploader
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: FFmpeg と日本語フォントをインストール
        working-directory: .
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg fonts-noto-cjk

      - name: VOICEVOX エンジンを起動 (青山龍星の男性声)
        working-directory: .
        run: |
          docker run -d --name voicevox -p 50021:50021 \
            voicevox/voicevox_engine:cpu-ubuntu20.04-latest
          for i in $(seq 1 90); do
            if curl -fs http://127.0.0.1:50021/version > /dev/null; then
              echo "VOICEVOX ready"; exit 0
            fi
            sleep 2
          done
          echo "VOICEVOX が起動しませんでした (pyopenjtalk にフォールバックします)"

      - name: Python パッケージをインストール
        run: pip install -q -r requirements.txt

      - name: 認証ファイルを配置
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$YOUTUBE_CLIENT_SECRET" ] || [ -z "$YOUTUBE_TOKEN" ]; then
            echo "::error::Secrets の YOUTUBE_CLIENT_SECRET / YOUTUBE_TOKEN が未設定です"
            exit 1
          fi
          printf '%s' "$YOUTUBE_CLIENT_SECRET" > client_secret.json
          printf '%s' "$YOUTUBE_TOKEN" > token.json

      - name: アフレコ動画を生成 → YouTube 予約投稿
        env:
          FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
          FONT_NAME: Noto Sans CJK JP
          TTS_ENGINE: auto
          PUBLISH_AT_JST: ${{ github.event.inputs.publish_at_jst || '2026-06-18 12:00' }}
        run: python publish_voiceover.py

      - name: 失敗時はエラー内容をログに表示
        if: failure()
        run: |
          echo "=== logs/error_log.txt ==="
          cat logs/error_log.txt 2>/dev/null || echo "(エラーログなし)"
